<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rank Widget — Sign in</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="mark"></span><h1>RANK WIDGET</h1></div>

  <div class="tabs">
    <button id="tabLogin" class="active" type="button">Sign in</button>
    <button id="tabRegister" type="button">Create account</button>
  </div>

  <div class="panel">
    <form id="authForm">
      <label for="username">Username</label>
      <input id="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required minlength="8">

      <button class="btn-primary" type="submit" id="submitBtn">Sign in</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <p class="hint" style="text-align:center; color: var(--text-dim); font-size: 0.8rem;">
    Your password is only used to log in here — it has nothing to do with your Discord or Riot accounts.
  </p>
</div>

<script>
let mode = "login";
const tabLogin = document.getElementById("tabLogin");
const tabRegister = document.getElementById("tabRegister");
const submitBtn = document.getElementById("submitBtn");
const msg = document.getElementById("msg");

function setMode(next) {
  mode = next;
  tabLogin.classList.toggle("active", mode === "login");
  tabRegister.classList.toggle("active", mode === "register");
  submitBtn.textContent = mode === "login" ? "Sign in" : "Create account";
  msg.style.display = "none";
}
tabLogin.onclick = () => setMode("login");
tabRegister.onclick = () => setMode("register");

// If already logged in, skip straight to the dashboard.
fetch("/api/me").then(r => r.json()).then(d => {
  if (d.loggedIn) window.location.href = "/dashboard.html";
});

document.getElementById("authForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  submitBtn.disabled = true;
  msg.style.display = "none";

  try {
    const res = await fetch(`/api/${mode === "login" ? "login" : "register"}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Something went wrong");
    window.location.href = "/dashboard.html";
  } catch (err) {
    msg.textContent = err.message;
    msg.className = "msg error";
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
