<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting Discord...</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="mark"></span><h1>RANK WIDGET</h1></div>
  <div class="panel">
    <h2 id="statusTitle">Connecting your Discord account...</h2>
    <p class="hint" id="statusMsg">Hang on a second.</p>
  </div>
</div>

<script>
// Discord's implicit grant puts the token in the URL FRAGMENT (after #),
// which browsers never send to any server — this page's only job is to
// read it client-side and relay it to our backend over a normal request.
const hash = new URLSearchParams(window.location.hash.slice(1));
const accessToken = hash.get("access_token");
const state = hash.get("state");
const errorParam = hash.get("error");

async function run() {
  const titleEl = document.getElementById("statusTitle");
  const msgEl = document.getElementById("statusMsg");

  if (errorParam) {
    titleEl.textContent = "Connection cancelled";
    msgEl.textContent = "Discord reported: " + errorParam + ". Redirecting you back...";
    setTimeout(() => (window.location.href = "/dashboard.html?discord=error&message=" + encodeURIComponent(errorParam)), 1800);
    return;
  }

  if (!accessToken || !state) {
    titleEl.textContent = "Something went wrong";
    msgEl.textContent = "No access token came back from Discord. Redirecting you back...";
    setTimeout(() => (window.location.href = "/dashboard.html?discord=error&message=" + encodeURIComponent("No access token received")), 1800);
    return;
  }

  try {
    const res = await fetch("/api/discord/callback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ accessToken, state }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Linking failed");

    titleEl.textContent = "Connected!";
    msgEl.textContent = "Redirecting you back to the dashboard...";
    setTimeout(() => (window.location.href = "/dashboard.html?discord=linked"), 800);
  } catch (err) {
    titleEl.textContent = "Something went wrong";
    msgEl.textContent = err.message;
    setTimeout(() => (window.location.href = "/dashboard.html?discord=error&message=" + encodeURIComponent(err.message)), 2200);
  }
}
run();
</script>
</body>
</html>
